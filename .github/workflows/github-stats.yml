name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure assets dir
        run: mkdir -p assets

      - name: Download stats card (validate svg)
        run: |
          set -e
          tmp="assets/.github-stats.tmp.svg"
          url="https://github-readme-stats.vercel.app/api?username=Lui-die-lui&show_icons=true&theme=dark&hide_border=true&cache_seconds=21600"
          curl -fsSL "$url" -o "$tmp"
          grep -q "<svg" "$tmp"
          mv "$tmp" "assets/github-stats.svg"

      - name: Download top langs card (validate svg)
        run: |
          set -e
          tmp="assets/.top-langs.tmp.svg"
          url="https://github-readme-stats.vercel.app/api/top-langs/?username=Lui-die-lui&layout=compact&theme=dark&hide_border=true&cache_seconds=21600"
          curl -fsSL "$url" -o "$tmp"
          grep -q "<svg" "$tmp"
          mv "$tmp" "assets/top-langs.svg"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          git diff --cached --quiet || git commit -m "chore: update github stats svgs"
          git push
